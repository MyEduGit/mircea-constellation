name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-claude-doc:
    name: Validate claude-doc package
    runs-on: ubuntu-22.04   # pinned for reproducible shellcheck version
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck + jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck jq
          shellcheck --version
          jq --version

      - name: Ensure validator is executable
        run: chmod +x setup/claude-doc/scripts/validate.sh

      - name: Run package validator
        run: ./setup/claude-doc/scripts/validate.sh
