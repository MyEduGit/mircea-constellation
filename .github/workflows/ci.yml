name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-claude-doc:
    name: Validate claude-doc package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck installer and hooks
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shopt -s nullglob
          files=(setup/claude-doc/install.sh setup/claude-doc/hooks/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no scripts to check"
            exit 0
          fi
          shellcheck "${files[@]}"

      - name: Validate settings.snippet.json
        run: |
          jq . setup/claude-doc/settings.snippet.json > /dev/null

      - name: Verify skill frontmatter present
        run: |
          head -1 setup/claude-doc/skills/diagram-on-completion.md | grep -qx '---' \
            || { echo "skill file missing YAML frontmatter"; exit 1; }
