name: Deploy to GitHub Pages

# Deploys ONLY the dashboard (index.html + status.json) to Pages.
# Explicitly excludes setup/, scripts, config, env files, and the /jobs/
# archive created by the DOC rule — none of those belong on the public site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Stage site (index.html + status.json only)
        run: |
          mkdir -p _site
          cp index.html   _site/
          cp status.json  _site/
          # Prevent Jekyll processing (safe default for hand-written HTML)
          touch _site/.nojekyll
          echo "Staged files:"
          ls -la _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
