# SeedanceClaw — compose definition.
# Run from seedanceclaw/ directory; .env (generated by install script)
# supplies HOST_UID, HOST_GID, FAL_KEY.

services:
  seedanceclaw:
    build:
      context: ..
      dockerfile: seedanceclaw/Dockerfile
      args:
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    container_name: seedanceclaw
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /app
    environment:
      - CLAW_NAME=SeedanceClaw
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Seedance model IDs — override to switch between v1/v2 or Pro/standard.
      - SEEDANCE_MODEL_T2V=${SEEDANCE_MODEL_T2V:-fal-ai/bytedance/seedance/v1/pro/text-to-video}
      - SEEDANCE_MODEL_I2V=${SEEDANCE_MODEL_I2V:-fal-ai/bytedance/seedance/v1/pro/image-to-video}
      # FAL_KEY is required. Set it in seedanceclaw/.env (never commit the key).
      - FAL_KEY=${FAL_KEY:-}
    volumes:
      - /opt/seedanceclaw-data:/data
    ports:
      - "127.0.0.1:8086:8086"
    networks:
      - urantios_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8086/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

networks:
  urantios_net:
    driver: bridge
