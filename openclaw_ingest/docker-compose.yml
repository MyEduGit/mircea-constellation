# OpenClaw@URANTiOS-ingest — compose definition.
# Run from openclaw_ingest/ directory; .env (generated by install script)
# supplies HOST_UID, HOST_GID, and DATASET_NAME.

services:
  openclaw-ingest:
    build:
      context: ..                       # repo root — gives access to cognee_config.py
      dockerfile: openclaw_ingest/Dockerfile
      args:
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    container_name: openclaw-ingest
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /app
    environment:
      - CLAW_NAME=OpenClaw@URANTiOS-ingest
      - DATASET_NAME=${DATASET_NAME:-mircea_corpus}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Host Ollama is native on URANTiOS; reach it from inside the container
      # via the host-gateway mapping below. cognee_config.init() respects this.
      - COGNEE_OLLAMA_ENDPOINT=http://host.docker.internal:11434
      # Point Cognee at the bind-mounted host data dir so writes land in the
      # shared LanceDB + Kuzu store that already lives on URANTiOS.
      - COGNEE_DATA_ROOT=/home/openclaw/.cognee/data
      - COGNEE_MODE=local
    volumes:
      # Pipeline working dirs — bind to a host path the operator controls.
      - /opt/openclaw-data:/data
      # Shared Cognee datastore — zero network hop, same files Cognee elsewhere
      # on this host already reads. Install script ensures host dir exists
      # and is owned by the invoking user.
      - ${HOME}/.cognee/data:/home/openclaw/.cognee/data
    extra_hosts:
      # Linux needs the explicit host-gateway mapping for host.docker.internal.
      - "host.docker.internal:host-gateway"
    ports:
      # Local-only — bound to loopback on host so nothing is publicly exposed.
      - "127.0.0.1:8080:8080"
    networks:
      - urantios_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

networks:
  urantios_net:
    driver: bridge
