  # ── Elements and Performance Criteria (verbatim from CP term plan) ──
  elements:
    - id: "1"
      title: "Identify and clarify own goals"
      performance_criteria:
        - id: "1.1"
          text: "Identify and prioritise goals"
        - id: "1.2"
          text: "Review and compare current skills and knowledge with identified goals"
        - id: "1.3"
          text: "Identify any additional skills requirements to meet identified goals"
        - id: "1.4"
          text: "Identify previous experiences that may impact on achieving identified goals"
        - id: "1.5"
          text: "Identify and access support resources to achieve goals"
    - id: "2"
      title: "Develop and document an individual learning plan to achieve goals"
      performance_criteria:
        - id: "2.1"
          text: "Clarify the purpose of an individual learning plan"
        - id: "2.2"
          text: "Identify the features of an individual learning plan"
        - id: "2.3"
          text: "Confirm and apply the processes for developing an individual learning plan"
        - id: "2.4"
          text: "Complete the individual learning plan"
    - id: "3"
      title: "Prepare portfolio of completed work samples"
      performance_criteria:
        - id: "3.1"
          text: "Review the outcomes of the learning plan with an appropriate support person/s"
        - id: "3.2"
          text: "Identify any barriers encountered and discuss alternative options with an appropriate support person/s"
        - id: "3.3"
          text: "Document achievements using a simple format agreed with an appropriate support person/s"
        - id: "3.4"
          text: "Clarify and confirm format of portfolio"
        - id: "3.5"
          text: "Collect examples of evidence for portfolio"
    - id: "4"
      title: "Monitor and update the individual learning plan"
      performance_criteria:
        - id: "4.1"
          text: "Identify progress towards identified goals and objectives"
        - id: "4.2"
          text: "Determine factors which contributed to success in meeting goals"
        - id: "4.3"
          text: "Note barriers to success in meeting goals"
        - id: "4.4"
          text: "Identify strategies to address barriers"
        - id: "4.5"
          text: "Amend individual learning plan as needed"

  # ── Required Knowledge and Skills (verbatim) ──
  required_knowledge_skills:
    - id: "KS1"
      text: "Different types of goals such as personal and work"
    - id: "KS2"
      text: "Difference between long- and short-term goals"
    - id: "KS3"
      text: "Source of additional support"
    - id: "KS4"
      text: |
        Oral communication skills to:
        • take turns to maintain simple discussion about learning goals and
          potential issues in achieving them
        • ask and respond to questions about learning goals
        • discuss implementation of a learning plan
    - id: "KS5"
      text: |
        Literacy skills to:
        • follow simple instructions to complete a simple written template
        • use sentences of one or two clauses to document own achievement
          of learning goals
        • use key words related to own learning
    - id: "KS6"
      text: "Problem solving skills to draw on own experiences to identify current skills and learning goals"

  # Performance Evidence / Foundation Skills not captured in the pattern
  # source we had — leave as TBD until verified from the unit PDF.
  performance_evidence: []
  foundation_skills_block: []

  # ── Foundation Skills (ACSF) targeted when delivered at Cert III level ──
  foundation_skills:
    - domain: "Learning"
      level: 3
      indicator: "3.01"
    - domain: "Learning"
      level: 3
      indicator: "3.02"

