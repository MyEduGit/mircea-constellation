# Unit catalogue — CommunityPlus AMEP
#
# Mapping of VU unit codes to the parent Victorian accredited courses they
# appear in (source: Mircea Matthews' CommunityPlus catalogue extract).
# Each unit has a corresponding per-unit YAML in this directory which, once
# filled from the VRQA course doc + CommunityPlus Mapping + Assessor Guide,
# is the input for generate.py.
#
# Parent-course titles are marked "verify" — confirm exact titles against the
# VRQA accredited course register before publishing any generated plan.

