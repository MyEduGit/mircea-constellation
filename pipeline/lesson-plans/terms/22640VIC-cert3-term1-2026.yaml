  stream: "SEE"
  stream_substream: "Basic"
  framework_code: "22640VIC"
  framework_level_label: "Cert III"
  framework_title: "Certificate III in EAL (Access)"
  accreditation_period: "TBD_FROM_VRQA_COURSE_DOC"     # reaccredited 2022/23

