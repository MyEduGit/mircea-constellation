# CommunityPlus — SEE Unit Session Plan: Term 1 — Year 2026
# Certificate III in EAL (Access) — 22640VIC, SEE Stream: Basic
#
# Pattern source: Denis's Cert3_Term1 2026 lesson planning (Word doc, 13 pp).
# Transcribed verbatim from the macro-skills matrix rows. No learner PII.
#
# This is the canonical worked example demonstrating the term-plan schema.
# Run:  python3 ../generate.py --mode term 22640VIC-cert3-term1-2026

header:
  left_colophon: "Learning for Employment"
  right_colophon: "CommunityPlus"
  title: "SEE Unit Session Plan"
  term_label: "Term 1"
  year: 2026

