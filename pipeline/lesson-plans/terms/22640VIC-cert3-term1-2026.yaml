# CommunityPlus — SEE Unit Session Plan: Term 1 — Year 2026
# Certificate III in EAL (Access) — 22640VIC, SEE Stream: Basic
#
# Strictly a compliance shell: identifies WHICH units are threaded through the
# term and at WHICH ACSF level. All substantive content is rendered from the
# authoritative artefacts pointed to:
#   - VRQA accredited course doc       → units/<code>.yaml (Elements / PCs / KS)
#   - training.gov.au unit PDF         → units/<code>.yaml (PE / FS verbatim)
#   - CommunityPlus LWA Mapping        → units/<code>.yaml → unit.mapping.rows
#   - CommunityPlus Assessor Guide     → units/<code>.yaml → unit.assessor_guide
#   - DEWR Australian Core Skills Framework → templates/acsf-indicators.yaml
#   - Victorian school calendar (gov)  → templates/vic-school-calendar-2026.yaml
#
# Run:  python3 ../generate.py --mode term 22640VIC-cert3-term1-2026
#
# Trainer-specific narrative (theme wording, macro-skill prose, classroom
# resource lists) is OUT OF SCOPE for this artefact. It is trainer-local and
# belongs in the trainer's personal lesson copy, not the audit artefact.

