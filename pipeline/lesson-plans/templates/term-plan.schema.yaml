# Term Unit Session Plan — CommunityPlus SEE / AMEP
#
# This is the **primary planning artefact** CommunityPlus produces per term.
# It is strictly a compliance artefact: every rendered block is VRQA / DEWR /
# Home Affairs verbatim or a direct index into the CommunityPlus Mapping
# document. Trainer-specific narrative (theme wording, macro-skill prose,
# classroom resources) is out of scope for this pipeline — the pipeline
# produces the audit surface, not the trainer's personal lesson copy.
#
# Rendered body (in order):
#   1. Header strip  — course identity, stream, trainer, class, term dates
#   2. Units threaded through this term (table)
#   3. ACSF indicator grid for the framework level (verbatim from DEWR)
#   4. For each unit:
#        a. Elements + Performance Criteria (verbatim, VRQA)
#        b. Required Knowledge & Skills / Knowledge Evidence (verbatim)
#        c. Performance Evidence (verbatim, where present)
#        d. Foundation Skills (verbatim, where present)
#        e. Mapping rows — assessment_task × PCs × KS × FS × evidence
#           (source: CommunityPlus LWA Mapping document)
#        f. Assessor Guide tasks (source: CommunityPlus Assessor Guide)
#   5. Term calendar (source: vic.gov.au + CP academic calendar)
#   6. Compliance frame (VRQA / ASQA / DEWR|Home Affairs)
#
# Title on the delivered document:
#   "<STREAM> Unit Session Plan: Term <N> — Year <YYYY>"
#   e.g. "SEE Unit Session Plan: Term 1 — Year 2026"
#
# Copy this file to pipeline/lesson-plans/terms/<COURSE>-<LEVEL>-term<N>-<YYYY>.yaml
# and fill every TBD_FROM_* from the authoritative source:
#   TBD_FROM_VRQA_COURSE_DOC → the VRQA accredited course document
#   TBD_FROM_TGA_UNIT_PDF    → the training.gov.au unit PDF (verbatim)
#   TBD_FROM_LWA_MAPPING     → the CommunityPlus "LWA mapping" document
#   TBD_FROM_ASSESSOR_GUIDE  → the CommunityPlus Assessor Guide

# ─────────────────────────────────────────────────────────────────────
# 1. Header (top-of-page branding and identity — same on every page)
# ─────────────────────────────────────────────────────────────────────
header:
  # Co-branded masthead: programme colophon paired with RTO colophon.
  # For SEE delivery the left colophon is "Learning for Employment".
  left_colophon: "Learning for Employment"
  right_colophon: "CommunityPlus"
  title: "SEE Unit Session Plan"        # or "AMEP Unit Session Plan" etc.
  term_label: "Term 1"                  # "Term 1" / "Term 2" / "Term 3" / "Term 4"
  year: 2026

# ─────────────────────────────────────────────────────────────────────
# 2. Course and stream identity
# ─────────────────────────────────────────────────────────────────────
course:
  # DEWR / Home Affairs programme stream the class is funded under:
  #   "SEE"  — Skills for Education and Employment (DEWR contract)
  #   "AMEP" — Adult Migrant English Program (Home Affairs contract)
  #   "SF"   — Skills First Foundation (Vic state funding)
  #   "FFS"  — Fee-for-service
  stream: "SEE"
  stream_substream: "Basic"             # optional, e.g. "Basic" / "Intermediate"

  # VRQA-accredited parent course
  framework_code: "22640VIC"            # e.g. 22484VIC / 22640VIC
  framework_level_label: "Cert III"     # "Cert I" / "Cert II" / "Cert III" / "Cert IV"
  framework_title: "TBD_FROM_VRQA_COURSE_DOC"    # e.g. "Certificate III in EAL (Access)"
  accreditation_period: "TBD_FROM_VRQA_COURSE_DOC"

  # ACSF level the cohort sits at for SEE / AMEP progress reporting.
  # Drives which block of templates/acsf-indicators.yaml is rendered.
  #   Cert I    → ACSF 1 (+ Pre L1)
  #   Cert II   → ACSF 2
  #   Cert III  → ACSF 3
  #   Cert IV   → ACSF 4
  acsf_level: 3

# ─────────────────────────────────────────────────────────────────────
# 3. Trainer / class  (identity only — no pedagogical content)
# ─────────────────────────────────────────────────────────────────────
trainer:
  name: ""                              # document header "Trainer/Assessor:"
  credential: "TAE40122"
  vocational_competency: ""
  industry_currency: ""

class:
  code: "CPxxxExx"                      # aXcelerate class code
  campus: ""

# ─────────────────────────────────────────────────────────────────────
# 4. Units threaded through this term
# ─────────────────────────────────────────────────────────────────────
# Distinguish:
#   ongoing — unit delivered across all terms (e.g. VU22384 portfolio)
#   term    — unit delivered in THIS term only
units:
  - code: "VU22384"
    title: "TBD_FROM_TGA_UNIT_PDF"
    role: "ongoing"                     # ongoing / term
    unit_yaml: "units/VU22384.yaml"     # pointer — generator pulls verbatim
  - code: "VUxxxxx"
    title: "TBD_FROM_TGA_UNIT_PDF"
    role: "term"
    unit_yaml: "units/VUxxxxx.yaml"

# ─────────────────────────────────────────────────────────────────────
# 5. Term calendar (authoritative source: vic.gov.au + CP academic calendar)
# ─────────────────────────────────────────────────────────────────────
# For Vic school terms see templates/vic-school-calendar-2026.yaml —
# statutory basis: Education and Training Reform Regulations 2017, Reg 13.
# Minister-approved 5-year blocks (2026–2030 approved 28 June 2021).
calendar:
  term_start: "YYYY-MM-DD"
  term_end:   "YYYY-MM-DD"
  weeks: 10
  sessions_per_week: 2                  # AMEP / SEE Evening convention
  public_holidays_impacting:            # holidays that fall INSIDE the term
    - date: "YYYY-MM-DD"
      name: ""

# ─────────────────────────────────────────────────────────────────────
# 6. Template contract (generator enforces ≤ VERSION)
# ─────────────────────────────────────────────────────────────────────
template:
  kind: "term-plan"
  version: "2.0"                        # v2 = mapping-first, trainer prose removed
