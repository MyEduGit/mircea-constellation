# Victorian school calendar — 2026
#
# Authoritative public-domain term dates, used as the default term boundary
# for CommunityPlus EAL/AMEP/SEE term plans. CP's own academic calendar
# (issued internally) is the operative source if it diverges from the
# state schedule — override per term YAML where needed.
#
# Source: Victorian Government — School term dates and holidays
#   https://www.vic.gov.au/school-term-dates-and-holidays-victoria
#   https://www.education.vic.gov.au/about/department/Pages/datesterm.aspx

year: 2026

terms:
  - id: "T1"
    start: "2026-01-27"   # Tuesday (govt-school students start Wed 28 Jan)
    finish: "2026-04-02"  # Thursday
    weeks: 10             # 9 calendar weeks + 4 days; CP convention is "10"
  - id: "T2"
    start: "2026-04-20"   # Monday
    finish: "2026-06-26"  # Friday
    weeks: 10
  - id: "T3"
    start: "2026-07-13"   # Monday
    finish: "2026-09-18"  # Friday
    weeks: 10
  - id: "T4"
    start: "2026-10-05"   # Monday
    finish: "2026-12-18"  # Friday
    weeks: 11

# Victorian public holidays in 2026 (subset relevant to school terms).
# 'in_term' is the term id the holiday falls inside, or null if it falls in
# a school-holiday window between terms.
public_holidays:
  - date: "2026-01-26"
    name: "Australia Day"
    in_term: null              # day before T1 starts
  - date: "2026-03-09"
    name: "Labour Day"
    in_term: "T1"              # only public holiday inside T1
  - date: "2026-04-03"
    name: "Good Friday"
    in_term: null              # day after T1 ends
  - date: "2026-04-04"
    name: "Saturday before Easter Sunday"
    in_term: null
  - date: "2026-04-05"
    name: "Easter Sunday"
    in_term: null
  - date: "2026-04-06"
    name: "Easter Monday"
    in_term: null
  - date: "2026-04-25"
    name: "ANZAC Day"
    in_term: "T2"              # Saturday — minimal class impact
  - date: "2026-06-08"
    name: "King's Birthday"
    in_term: "T2"              # Monday
  # AFL Grand Final eve (declared annually) — added when gazetted
  - date: "2026-11-03"
    name: "Melbourne Cup Day"
    in_term: "T4"              # Tuesday
  - date: "2026-12-25"
    name: "Christmas Day"
    in_term: null              # after T4 ends
  - date: "2026-12-26"
    name: "Boxing Day"
    in_term: null
