# Fireclaw rules — declarative remediation policy.
#
# Single source of truth for what Fireclaw is allowed to do.
# Add a rule = explicitly authorize a remediation path.
# Remove a rule = revoke that authority.
#
# Schema:
#   id:           short stable identifier (used in logs and counters)
#   description:  human-readable purpose (Truth: must be honest)
#   signal:
#     kind:       http | tcp | file | nemoclaw
#     (kind-specific fields — see fireclaw/signals.py)
#   condition:
#     consecutive_failures: int   how many cycles of bad signal before action
#     cooldown_seconds:     int   minimum seconds between action firings
#   action:
#     kind:       restart_systemd | restart_docker | disable_n8n_workflow
#                 | quarantine | alert_telegram | alert_only
#     (kind-specific fields — see fireclaw/actions.py)
#   escalate:
#     on_action_failure:    bool  alert if the action itself fails
#     on_repeated_trigger:  int   alert if the rule fires N times in 24h

rules:

  # ── Constellation dashboard health (mircea-constellation status.json) ──
  - id: status-json-stale
    description: "Status file missing or unreadable — observer pipeline is down."
    signal:
      kind: file
      path: ./status.json
      field: fleet.status
      expect: ok
    condition:
      consecutive_failures: 3
      cooldown_seconds: 1800
    action:
      kind: alert_only
      message: "status.json fleet.status not 'ok' for 3 cycles."
    escalate:
      on_action_failure: false
      on_repeated_trigger: 5

