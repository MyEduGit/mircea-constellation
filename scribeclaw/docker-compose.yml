# ScribeClaw — compose definition.
# Run from scribeclaw/ directory; .env (generated by install script)
# supplies HOST_UID, HOST_GID.

services:
  scribeclaw:
    build:
      context: ..
      dockerfile: scribeclaw/Dockerfile
      args:
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    container_name: scribeclaw
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /app
    environment:
      - CLAW_NAME=ScribeClaw
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE=${WHISPER_COMPUTE:-int8}
      - WHISPER_CACHE_DIR=/data/models
      # AssemblyAI key is read from .env; leave blank to disable those handlers.
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY:-}
      # Obsidian vault path INSIDE the container (see volumes). Leave blank
      # to disable export_obsidian; the handler refuses cleanly when unset.
      - OBSIDIAN_VAULT=${OBSIDIAN_VAULT_CONTAINER_PATH:-/vault}
    volumes:
      - /opt/scribeclaw-data:/data
      # Optional: bind-mount the host vault into /vault (container path).
      # If OBSIDIAN_VAULT_HOST is unset, the mount resolves to an empty
      # named path and export_obsidian will fail with vault_path_not_a_directory
      # — which is the correct, honest behaviour when no vault is configured.
      - ${OBSIDIAN_VAULT_HOST:-/opt/scribeclaw-data/vault-unset}:${OBSIDIAN_VAULT_CONTAINER_PATH:-/vault}
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - urantios_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

networks:
  urantios_net:
    driver: bridge
