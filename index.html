const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawStars(); layoutNodes(); });
const stars = Array.from({length: 250}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.5 + 0.3,
  a: Math.random() * 0.5 + 0.3,
  s: Math.random() * 0.01 + 0.002
}));
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a += Math.sin(Date.now() * s.s) * 0.005;
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${Math.max(0.1, Math.min(0.8, s.a))})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

//  RENDERING
// ══════════════════════════════════════════════════════════════════════

const map = document.getElementById('map');
const svg = document.getElementById('connections');

function layoutNodes() {
  const w = map.clientWidth;
  const h = map.clientHeight;
  map.querySelectorAll('.node').forEach(n => n.remove());
  map.querySelectorAll('.zone-label').forEach(n => n.remove());
  svg.innerHTML = '';

  // Zone labels
  const zones = [
    { text: 'COMMAND', x: 0.50, y: 0.01 },
    { text: 'INFRASTRUCTURE', x: 0.50, y: 0.28 },
    { text: 'AI MODELS', x: 0.06, y: 0.35 },
    { text: 'BOT FLEET', x: 0.06, y: 0.65 },
    { text: 'SERVICES', x: 0.88, y: 0.62 },
  ];
  zones.forEach(z => {
    const lbl = document.createElement('div');
    lbl.className = 'zone-label';
    lbl.textContent = z.text;
    lbl.style.left = (z.x * w) + 'px';
    lbl.style.top = (z.y * h) + 'px';
    map.appendChild(lbl);
  });

  // Render nodes
  nodes.forEach(n => {
    const div = document.createElement('div');
    div.className = 'node';
    div.dataset.id = n.id;
    div.dataset.status = (n.id === 'lobster' || n.id === 'fireclaw' || n.id === 'lucifericlaw' || n.id === 'cinemaclaw') ? 'new' : (n.id === 'ollama' ? 'warn' : 'ok');
    div.style.left = (n.x * w - 50) + 'px';
    div.style.top = (n.y * h - 26) + 'px';
    div.innerHTML = `<div class="node-icon ${n.type}">${n.icon}</div><div class="node-label">${n.label}</div><div class="node-sublabel">${n.sub}</div>`;
    div.onclick = () => openPanel(n);
    map.appendChild(div);
  });

  // Render connections
  connections.forEach(([a, b, cls]) => {
    const na = nodes.find(n => n.id === a);
    const nb = nodes.find(n => n.id === b);
    if (!na || !nb) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', na.x * w);
    line.setAttribute('y1', na.y * h);
    line.setAttribute('x2', nb.x * w);
    line.setAttribute('y2', nb.y * h);
    line.classList.add(cls || 'active');
    svg.appendChild(line);
  });
}
layoutNodes();

function openPanel(node) {
  const panel = document.getElementById('panel');
  document.getElementById('panelTitle').textContent = `${node.icon} ${node.label}`;
  const details = nodeDetails[node.id] || {};
  let html = '';
  for (const [k, v] of Object.entries(details)) {
    if (k === 'Tier') {
      const cls = { 'COMMAND':'tier-command','INFRASTRUCTURE':'tier-infra','AI':'tier-ai','BOT FLEET':'tier-bot','SERVICES':'tier-service','GOVERNANCE':'tier-command' }[v] || 'tier-command';
      html += `<div style="text-align:center;margin-top:6px"><span class="tier-badge ${cls}">${v}</span></div>`;
    } else {
      html += `<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${v}</span></div>`;
    }
  }
  document.getElementById('panelContent').innerHTML = html;
  panel.classList.add('open');
}
function closePanel() { document.getElementById('panel').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
document.getElementById('map').addEventListener('click', e => {
  if (e.target === map || e.target === svg) closePanel();
});

// Live status
async function loadStatus() {
  try {
    const r = await fetch('status.json?t=' + Date.now());
    if (!r.ok) return;
    const data = await r.json();
    const bar = document.getElementById('statusBar');
    const items = [];
    if (data.fleet) items.push(`<span><span class="dot dot-${data.fleet.status === 'ok' ? 'green' : 'yellow'}"></span>Fleet: ${data.fleet.bots}</span>`);
    if (data.nanoclaw) items.push(`<span><span class="dot dot-${data.nanoclaw.status === 'ok' ? 'green' : 'red'}"></span>NanoClaw: ${data.nanoclaw.version || '?'}</span>`);
    if (data.fireclaw) items.push(`<span><span class="dot dot-${data.fireclaw.status === 'ok' ? 'green' : (data.fireclaw.status === 'warn' ? 'yellow' : (data.fireclaw.status === 'new' ? 'blue' : 'red'))}"></span>Fireclaw: ${data.fireclaw.version || data.fireclaw.status || '?'}</span>`);
    if (data.lucifericlaw) items.push(`<span><span class="dot dot-${data.lucifericlaw.status === 'ok' ? 'green' : (data.lucifericlaw.status === 'warn' ? 'yellow' : (data.lucifericlaw.status === 'new' ? 'blue' : 'red'))}"></span>LuciferiClaw: ${data.lucifericlaw.version || data.lucifericlaw.status || '?'}</span>`);
    if (data.cinemaclaw) items.push(`<span><span class="dot dot-${data.cinemaclaw.status === 'ok' ? 'green' : (data.cinemaclaw.status === 'warn' ? 'yellow' : (data.cinemaclaw.status === 'new' ? 'blue' : 'red'))}"></span>CinemaClaw: ${data.cinemaclaw.version || data.cinemaclaw.status || '?'}</span>`);
    if (data.ollama) items.push(`<span><span class="dot dot-${data.ollama.status === 'ok' ? 'green' : 'yellow'}"></span>Ollama: ${data.ollama.model || 'offline'}</span>`);
    if (data.cognee) items.push(`<span><span class="dot dot-${data.cognee.status === 'ok' ? 'green' : 'yellow'}"></span>Cognee: ${data.cognee.version || 'offline'}</span>`);
    if (data.disk_openclaw) items.push(`<span><span class="dot dot-green"></span>OClaw: ${data.disk_openclaw}</span>`);
    if (data.disk_urantios) items.push(`<span><span class="dot dot-green"></span>UPrime: ${data.disk_urantios}</span>`);
    if (data.obsidian) items.push(`<span><span class="dot dot-green"></span>Vault: ${data.obsidian.docs} docs</span>`);
    items.push(`<span><span class="dot dot-blue"></span>Nodes: ${nodes.length}</span>`);
    if (data.updated) items.push(`<span style="color:#555">${new Date(data.updated).toLocaleTimeString()}</span>`);
    if (items.length) bar.innerHTML = items.join('');

    document.querySelectorAll('.node').forEach(n => {
      const id = n.dataset.id;
      if (data[id] && data[id].status) n.dataset.status = data[id].status;
    });
  } catch { /* status.json not yet available */ }
}
loadStatus();
setInterval(loadStatus, 30000);
