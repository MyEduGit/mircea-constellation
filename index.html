<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mircea's Constellation — Mission Control</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}
canvas#stars { position: fixed; top: 0; left: 0; z-index: 0; }
.container {
  position: relative;
  z-index: 1;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  text-align: center;
  padding: 12px;
  background: rgba(10,10,26,0.8);
  border-bottom: 1px solid rgba(100,149,237,0.3);
}
header h1 {
  font-size: 1.4em;
  background: linear-gradient(90deg, #6495ED, #DDA0DD, #FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
header .subtitle {
  font-size: 0.75em;
  color: #888;
  margin-top: 2px;
}
.council-btn {
  margin-top: 6px;
  background: none;
  border: 1px solid rgba(255,215,0,0.4);
  color: #FFD700;
  padding: 3px 14px;
  border-radius: 12px;
  font-size: 0.7em;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.3s;
}
.council-btn:hover, .council-btn.active {
  background: rgba(255,215,0,0.1);
  border-color: #FFD700;
  box-shadow: 0 0 12px rgba(255,215,0,0.3);
}
.status-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 6px;
  background: rgba(10,10,26,0.6);
  font-size: 0.7em;
  color: #aaa;
}
.status-bar .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.dot-green { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
.dot-yellow { background: #FFC107; box-shadow: 0 0 6px #FFC107; }
.dot-red { background: #f44336; box-shadow: 0 0 6px #f44336; }
.map {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.node {
  position: absolute;
  width: 110px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.3s, filter 0.3s;
  z-index: 2;
}
.node:hover { transform: scale(1.15); filter: brightness(1.3); }
.council-mode .node:hover { filter: brightness(1.3); }
.node-icon {
  width: 50px; height: 50px;
  border-radius: 50%;
  margin: 0 auto 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border: 2px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 15px rgba(100,149,237,0.4);
  position: relative;
  transition: border-color 0.4s, box-shadow 0.4s;
}
.node-icon::after {
  content: '';
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 50%;
  bottom: -2px; right: -2px;
  border: 2px solid #0a0a1a;
}
.node[data-status="ok"] .node-icon::after { background: #4CAF50; box-shadow: 0 0 8px #4CAF50; }
.node[data-status="warn"] .node-icon::after { background: #FFC107; box-shadow: 0 0 8px #FFC107; }
.node[data-status="down"] .node-icon::after { background: #f44336; box-shadow: 0 0 8px #f44336; }
.node-icon.controller { background: linear-gradient(135deg, #1a1a3e, #2a2a5e); border-color: #6495ED; }
.node-icon.server { background: linear-gradient(135deg, #1a3a1a, #2a5a2a); border-color: #4CAF50; }
.node-icon.bot { background: linear-gradient(135deg, #3a1a3a, #5a2a5a); border-color: #DDA0DD; }
.node-icon.service { background: linear-gradient(135deg, #3a3a1a, #5a5a2a); border-color: #FFD700; }
/* Council of Seven */
.council-mode .node.council-member .node-icon {
  border-color: #FFD700;
  box-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 40px rgba(255,215,0,0.2);
}
.council-mode .node.council-member .node-label { color: #FFD700; }
.council-mode .node:not(.council-member) { filter: brightness(0.35) saturate(0.2); }
.council-badge {
  display: none;
  position: absolute;
  top: -5px; left: -5px;
  width: 17px; height: 17px;
  border-radius: 50%;
  background: #FFD700;
  color: #000;
  font-size: 8px;
  font-weight: bold;
  align-items: center;
  justify-content: center;
  z-index: 3;
  border: 1.5px solid #0a0a1a;
}
.council-mode .council-member .council-badge { display: flex; }
svg.connections {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}
svg.connections line {
  stroke: rgba(100,149,237,0.15);
  stroke-width: 1;
  stroke-dasharray: 4 4;
}
svg.connections line.active {
  stroke: rgba(100,149,237,0.4);
  stroke-width: 1.5;
  animation: pulse-line 3s infinite;
}
svg.connections line.council-line {
  stroke: rgba(255,215,0,0.55);
  stroke-width: 1.5;
  stroke-dasharray: none;
  animation: council-pulse 2s infinite;
  display: none;
}
@keyframes pulse-line {
  0%, 100% { stroke-opacity: 0.2; }
  50% { stroke-opacity: 0.6; }
}
@keyframes council-pulse {
  0%, 100% { stroke-opacity: 0.3; }
  50% { stroke-opacity: 0.8; }
}
.panel {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(15,15,35,0.95);
  border: 1px solid rgba(100,149,237,0.4);
  border-radius: 12px;
  padding: 20px;
  min-width: 300px;
  max-width: 420px;
  z-index: 10;
  box-shadow: 0 0 40px rgba(100,149,237,0.2);
}
.panel.open { display: block; }
.panel h3 { color: #6495ED; margin-bottom: 10px; }
.panel .close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #888; font-size: 18px; }
.panel .info-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.8em; border-bottom: 1px solid rgba(255,255,255,0.05); }
.panel .info-label { color: #888; }
.panel .info-value { color: #e0e0e0; }
.panel .info-value.council { color: #FFD700; }
/* Council side panel */
.council-panel {
  display: none;
  position: fixed;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  background: rgba(10,10,26,0.97);
  border: 1px solid rgba(255,215,0,0.35);
  border-radius: 12px;
  padding: 14px;
  width: 270px;
  z-index: 10;
  box-shadow: 0 0 40px rgba(255,215,0,0.12);
  max-height: 88vh;
  overflow-y: auto;
}
.council-panel.open { display: block; }
.council-panel h3 {
  color: #FFD700;
  font-size: 0.82em;
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 3px;
}
.council-motto {
  color: #555;
  font-size: 0.58em;
  text-align: center;
  margin-bottom: 10px;
  font-style: italic;
}
.council-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 6px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
  border-bottom: 1px solid rgba(255,215,0,0.07);
}
.council-row:hover { background: rgba(255,215,0,0.06); }
.council-row:last-child { border-bottom: none; }
.c-num { color: #FFD700; font-size: 0.65em; font-weight: bold; min-width: 16px; padding-top: 2px; }
.c-icon { font-size: 1.15em; min-width: 22px; text-align: center; }
.c-info { flex: 1; }
.c-name { font-size: 0.74em; color: #e0e0e0; }
.c-role { font-size: 0.58em; color: #888; margin-top: 1px; }
.c-spirit { font-size: 0.55em; color: #FFD700; margin-top: 1px; opacity: 0.8; }
.governance {
  text-align: center;
  padding: 6px;
  background: rgba(10,10,26,0.8);
  border-top: 1px solid rgba(100,149,237,0.2);
  font-size: 0.65em;
  color: #666;
  letter-spacing: 1px;
}
.governance span { margin: 0 12px; }
.governance .truth { color: #6495ED; }
.governance .beauty { color: #DDA0DD; }
.governance .goodness { color: #FFD700; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="container">
  <header>
    <h1>MIRCEA'S CONSTELLATION</h1>
    <div class="subtitle">OpenClaw + NanoClaw Mission Control</div>
    <button class="council-btn" id="councilBtn" onclick="toggleCouncil()">&#9878; COUNCIL OF SEVEN</button>
  </header>
  <div class="status-bar" id="statusBar">
    <span><span class="dot dot-green"></span> Loading status...</span>
  </div>
  <div class="map" id="map">
    <svg class="connections" id="connections"></svg>
  </div>
  <div class="governance">
    <span>Governed by UrantiOS v1.0</span> |
    <span class="truth">Truth</span>
    <span class="beauty">Beauty</span>
    <span class="goodness">Goodness</span>
  </div>
</div>

<div class="panel" id="panel">
  <span class="close" onclick="closePanel()">&times;</span>
  <h3 id="panelTitle"></h3>
  <div id="panelContent"></div>
</div>

<div class="council-panel" id="councilPanel">
  <h3>&#9878; COUNCIL OF SEVEN</h3>
  <p class="council-motto">Seven Master Spirits &mdash; Governing the Constellation</p>
  <div id="councilList"></div>
</div>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); layoutNodes(); });
const stars = Array.from({length: 200}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.5 + 0.3,
  a: Math.random() * 0.5 + 0.3,
  s: Math.random() * 0.01 + 0.002
}));
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a += Math.sin(Date.now() * s.s) * 0.005;
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${Math.max(0.1, Math.min(0.8, s.a))})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

const council = [
  { id: 'imac',        num: 'I',   spirit: 'Master Spirit I — The Authority',    role: 'Father Function · Source of All Authority',    assoc: 'Universal Father' },
  { id: 'gabriel',    num: 'II',  spirit: 'Master Spirit II — The Word',         role: 'Bright & Morning Star · Chief of Staff',      assoc: 'Eternal Son' },
  { id: 'urantios',   num: 'III', spirit: 'Master Spirit III — The Spirit',      role: 'Governing OS · Infinite Executor',            assoc: 'Infinite Spirit' },
  { id: 'openclaw',   num: 'IV',  spirit: 'Master Spirit IV — The Executor',    role: 'Execution Node · Authority + Word',           assoc: 'Father + Son' },
  { id: 'nanoclaw',   num: 'V',   spirit: 'Master Spirit V — The Automation',   role: 'Autonomous Agent · Authority + Spirit',       assoc: 'Father + Spirit' },
  { id: 'hetzy',      num: 'VI',  spirit: 'Master Spirit VI — The Intelligence', role: 'Fleet Commander · Word + Spirit',             assoc: 'Son + Spirit' },
  { id: 'urantipedia',num: 'VII', spirit: 'Master Spirit VII — The Knowledge',  role: 'Living Encyclopedia · Trinity Synthesis',     assoc: 'Father + Son + Spirit' },
];
const councilIds = new Set(council.map(c => c.id));

const councilLinks = [
  ['imac','gabriel'],['gabriel','urantios'],['urantios','openclaw'],
  ['openclaw','nanoclaw'],['nanoclaw','hetzy'],['hetzy','urantipedia'],
  ['urantipedia','imac'],['gabriel','openclaw'],['urantios','hetzy'],
];

const nodes = [
  { id: 'iphone',      icon: '\uD83D\uDCF1', label: 'iPhone 16 Pro',     sub: 'Remote Control',    type: 'controller', x: 0.5,  y: 0.08 },
  { id: 'imac',        icon: '\uD83D\uDDA5\uFE0F', label: 'iMac M4',           sub: 'Controller Node',   type: 'controller', x: 0.25, y: 0.25 },
  { id: 'openclaw',    icon: '\u26A1', label: 'OpenClaw',          sub: '46.225.51.30',      type: 'server',     x: 0.35, y: 0.5  },
  { id: 'urantios',    icon: '\uD83C\uDF1F', label: 'URANTiOS Prime',    sub: '204.168.143.98',    type: 'server',     x: 0.65, y: 0.5  },
  { id: 'nanoclaw',    icon: '\uD83E\uDD80', label: 'NanoClaw v1.2.17', sub: 'Docker Agents',     type: 'server',     x: 0.78, y: 0.35 },
  { id: 'botfleet',    icon: '\uD83E\uDD16', label: 'Bot Fleet',         sub: '11 Telegram Bots',  type: 'bot',        x: 0.15, y: 0.5  },
  { id: 'hetzy',       icon: '\uD83C\uDF96\uFE0F', label: 'Hetzy PhD',         sub: 'Fleet Commander',   type: 'bot',        x: 0.12, y: 0.7  },
  { id: 'urantipedia', icon: '\uD83D\uDCD6', label: 'UrantiPedia',       sub: '.org + .com',       type: 'service',    x: 0.75, y: 0.7  },
  { id: 'ollama',      icon: '\uD83E\uDDE0', label: 'Ollama',            sub: 'qwen2.5:32b',       type: 'service',    x: 0.88, y: 0.6  },
  { id: 'amep',        icon: '\uD83C\uDF93', label: 'AMEP Hub',          sub: '21 Students',       type: 'service',    x: 0.3,  y: 0.75 },
  { id: 'obsidian',    icon: '\uD83D\uDC8E', label: 'Obsidian',          sub: 'Knowledge Vault',   type: 'service',    x: 0.5,  y: 0.85 },
  { id: 'gabriel',     icon: '\u2728', label: 'Gabriel',           sub: 'Morning Star',      type: 'bot',        x: 0.55, y: 0.3  },
];

const connections = [
  ['iphone','imac'],['iphone','botfleet'],
  ['imac','openclaw'],['imac','urantios'],
  ['openclaw','botfleet'],['openclaw','urantios'],
  ['urantios','nanoclaw'],['urantios','urantipedia'],
  ['urantios','ollama'],['urantios','gabriel'],
  ['imac','amep'],['imac','obsidian'],
  ['botfleet','hetzy'],['nanoclaw','iphone'],
  ['gabriel','urantipedia'],
];

const nodeDetails = {
  iphone:      { 'Device': 'iPhone 16 Pro Max 256GB', 'Role': 'Remote Control', 'Apps': 'Telegram, Claude, Termius', 'User ID': '828807562' },
  imac:        { 'Device': 'iMac M4', 'User': 'mircea8me.com', 'Dashboard': ':18800', 'AMEP Hub': ':18802', 'Fleet Bus': ':18801', 'Tailscale': '100.75.177.36', 'Council Role': 'Master Spirit I \u2014 The Authority' },
  openclaw:    { 'IP': '46.225.51.30', 'Type': 'CPX22 (8GB/80GB)', 'Location': 'Nuremberg', 'Ports': '18789/18791/18792', 'Bots': '9 active', 'Council Role': 'Master Spirit IV \u2014 The Executor' },
  urantios:    { 'IP': '204.168.143.98', 'Type': 'CCX23 (16GB/160GB)', 'Location': 'Helsinki', 'NanoClaw': 'v1.2.17 LIVE', 'Gabriel Brain': ':18900', 'Website': 'urantipedia.org', 'Council Role': 'Master Spirit III \u2014 The Spirit' },
  nanoclaw:    { 'Version': '1.2.17', 'Bot': '@nanoclaw_openclaw_bot', 'Container': 'Docker isolated', 'API': 'Claude SDK', 'Trigger': '@NanoClaw', 'Status': 'LIVE', 'Council Role': 'Master Spirit V \u2014 The Automation' },
  botfleet:    { 'Total': '11 bots', 'Active': '10/11', 'Commander': 'Hetzy PhD', 'Gateway': 'UrantiPedia Agent', 'Governance': 'UrantiOS v1.0' },
  hetzy:       { 'Bot': '@Hetzy_PhD_bot', 'Role': 'Fleet Commander', 'Autonomous': 'Yes (30min cycles)', 'Check-ins': 'Every 2 hours', 'Bots Managed': '10', 'Council Role': 'Master Spirit VI \u2014 The Intelligence' },
  urantipedia: { 'Domains': 'urantipedia.org + .com', 'Papers': '196 + Foreword', 'Personalities': '477', 'Concepts': '900', 'SSL': 'Certbot active', 'Council Role': 'Master Spirit VII \u2014 The Knowledge' },
  ollama:      { 'Model': 'qwen2.5:32b', 'Server': '204.168.143.98', 'RAM': '16GB dedicated', 'Purpose': 'Local AI reasoning', 'Status': 'Check required' },
  amep:        { 'Hub URL': '100.75.177.36:18802', 'Students': '21 total', 'Cert I': '7 students', 'Cert II': '9 students', 'Cert III': '5 students', 'Class': 'CP123E3/4' },
  obsidian:    { 'Type': 'Knowledge Vault', 'Bridge': 'Status sync every 10min', 'Export': 'JSON to constellation', 'Purpose': 'Research & notes' },
  gabriel:     { 'Role': 'Bright and Morning Star', 'Brain': ':18900 on URANTiOS', 'Chat': 'Floating star on website', 'Authority': 'Joint with Mircea', 'Council Role': 'Master Spirit II \u2014 The Word' },
};

const map = document.getElementById('map');
const svg = document.getElementById('connections');
let councilMode = false;

function layoutNodes() {
  const w = map.clientWidth;
  const h = map.clientHeight;
  map.querySelectorAll('.node').forEach(n => n.remove());
  svg.innerHTML = '';

  nodes.forEach(n => {
    const div = document.createElement('div');
    div.className = 'node' + (councilIds.has(n.id) ? ' council-member' : '');
    div.dataset.id = n.id;
    div.dataset.status = 'ok';
    div.style.left = (n.x * w - 55) + 'px';
    div.style.top  = (n.y * h - 30) + 'px';
    const cd = council.find(c => c.id === n.id);
    const badge = cd ? `<div class="council-badge">${cd.num}</div>` : '';
    div.innerHTML = `<div class="node-icon ${n.type}" style="position:relative">${badge}${n.icon}</div><div class="node-label">${n.label}</div><div class="node-sublabel">${n.sub}</div>`;
    div.onclick = () => openPanel(n);
    map.appendChild(div);
  });

  connections.forEach(([a, b]) => {
    const na = nodes.find(n => n.id === a);
    const nb = nodes.find(n => n.id === b);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', na.x * w); line.setAttribute('y1', na.y * h);
    line.setAttribute('x2', nb.x * w); line.setAttribute('y2', nb.y * h);
    line.classList.add('active');
    svg.appendChild(line);
  });

  councilLinks.forEach(([a, b]) => {
    const na = nodes.find(n => n.id === a);
    const nb = nodes.find(n => n.id === b);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', na.x * w); line.setAttribute('y1', na.y * h);
    line.setAttribute('x2', nb.x * w); line.setAttribute('y2', nb.y * h);
    line.classList.add('council-line');
    if (councilMode) line.style.display = 'block';
    svg.appendChild(line);
  });
}
layoutNodes();
window.addEventListener('resize', layoutNodes);

function toggleCouncil() {
  councilMode = !councilMode;
  document.getElementById('councilBtn').classList.toggle('active', councilMode);
  document.getElementById('councilPanel').classList.toggle('open', councilMode);
  document.getElementById('map').classList.toggle('council-mode', councilMode);
  svg.querySelectorAll('.council-line').forEach(l => {
    l.style.display = councilMode ? 'block' : 'none';
  });
  if (councilMode) buildCouncilPanel();
}

function buildCouncilPanel() {
  document.getElementById('councilList').innerHTML = council.map(c => {
    const node = nodes.find(n => n.id === c.id);
    return `<div class="council-row" onclick="openPanelById('${c.id}')">
      <div class="c-num">${c.num}</div>
      <div class="c-icon">${node.icon}</div>
      <div class="c-info">
        <div class="c-name">${node.label}</div>
        <div class="c-role">${c.role}</div>
        <div class="c-spirit">${c.spirit}</div>
      </div>
    </div>`;
  }).join('');
}

function openPanelById(id) {
  const node = nodes.find(n => n.id === id);
  if (node) openPanel(node);
}

function openPanel(node) {
  document.getElementById('panelTitle').textContent = `${node.icon} ${node.label}`;
  const details = nodeDetails[node.id] || {};
  document.getElementById('panelContent').innerHTML = Object.entries(details).map(([k, v]) =>
    `<div class="info-row"><span class="info-label">${k}</span><span class="info-value${k === 'Council Role' ? ' council' : ''}">${v}</span></div>`
  ).join('');
  document.getElementById('panel').classList.add('open');
}
function closePanel() { document.getElementById('panel').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

async function loadStatus() {
  try {
    const r = await fetch('status.json?t=' + Date.now());
    if (!r.ok) return;
    const data = await r.json();
    const bar = document.getElementById('statusBar');
    const items = [];
    if (data.fleet)        items.push(`<span><span class="dot dot-${data.fleet.status === 'ok' ? 'green' : 'yellow'}"></span> Fleet: ${data.fleet.bots}</span>`);
    if (data.nanoclaw)     items.push(`<span><span class="dot dot-${data.nanoclaw.status === 'ok' ? 'green' : 'red'}"></span> NanoClaw: ${data.nanoclaw.version || 'checking'}</span>`);
    if (data.ollama)       items.push(`<span><span class="dot dot-${data.ollama.status === 'ok' ? 'green' : 'yellow'}"></span> Ollama: ${data.ollama.model || 'offline'}</span>`);
    if (data.disk_openclaw) items.push(`<span><span class="dot dot-green"></span> OpenClaw: ${data.disk_openclaw}</span>`);
    if (data.disk_urantios) items.push(`<span><span class="dot dot-green"></span> URANTiOS: ${data.disk_urantios}</span>`);
    if (data.obsidian)     items.push(`<span><span class="dot dot-green"></span> Obsidian: ${data.obsidian.docs} docs</span>`);
    if (data.updated)      items.push(`<span style="color:#555">Updated: ${new Date(data.updated).toLocaleTimeString()}</span>`);
    if (items.length) bar.innerHTML = items.join('');
    document.querySelectorAll('.node').forEach(n => {
      const id = n.dataset.id;
      if (data[id] && data[id].status) n.dataset.status = data[id].status;
    });
  } catch { /* status.json not available */ }
}
loadStatus();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
